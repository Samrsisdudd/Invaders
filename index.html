<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Invaders</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    canvas {
      border: 2px solid white;
      background: black;
      max-width: 100vw;
      max-height: 80vh;
    }

    #mobileControls {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }

    .btn {
      width: 70px;
      height: 70px;
      font-size: 30px;
      border: none;
      border-radius: 50%;
      background: #222;
      color: white;touch-action: manipulation;
      
    }

    .btn:active {
      background: #555;
    }

    @media (min-width: 900px) {
      #mobileControls {
        display: none;
      }
    }
  </style>
</head>

<body>

  <canvas id="gameCanvas"></canvas>

  <div id="mobileControls">
    <button class="btn" id="leftBtn">◀</button>
    <button class="btn" id="shootBtn">●</button>
    <button class="btn" id="rightBtn">▶</button>
  </div>

  <script src="game.js"></script>

</body>
</html>
