<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Invaders</title>

  <style>
    <style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;

    display: flex;
    flex-direction: column;

    justify-content: center;
    align-items: center;

    height: 100vh;
  }

  canvas {
    border: 2px solid white;
    background: black;

    width: 95vw;
    max-width: 600px;

    height: auto;
    max-height: 70vh;
  }

  #mobileControls {
    display: flex;

    gap: 20px;

    margin-top: 10px;
    margin-bottom: 10px;
  }

  .btn {
    width: 70px;
    height: 70px;

    border: none;
    border-radius: 50%;

    background: #222;
    color: white;

    font-size: 28px;

    touch-action: manipulation;
  }

  .btn:active {
    background: #555;
  }

  /* desktop */
  @media (min-width: 900px) {
    #mobileControls {
      display: none;
    }

    canvas {
      width: 600px;
      height: 400px;
    }
  }
</style>
  </style>
</head>

<body>

  <canvas id="gameCanvas"></canvas>

  <div id="mobileControls">
    <button class="btn" id="leftBtn">◀</button>
    <button class="btn" id="shootBtn">●</button>
    <button class="btn" id="rightBtn">▶</button>
  </div>

  <script src="game.js"></script>

</body>
</html>
